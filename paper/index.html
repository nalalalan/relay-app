<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>relay paper</title>
<meta name="description" content="Relay paper and PDF.">
  <link rel="canonical" href="https://relay.aolabs.io/paper/">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="AO Labs">
  <meta property="og:title" content="Proof-governed autonomy for live revenue experiments">
  <meta property="og:description" content="Continuous research record for Relay.">
  <meta property="og:url" content="https://relay.aolabs.io/paper/">
  <link rel="icon" href="https://aolabs.io/favicon.svg?v=20260516-suite-pane" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f3;
      --panel: #fff;
      --ink: #151515;
      --muted: #687067;
      --line: #dfe5dc;
      --shadow: 0 16px 42px rgba(17, 24, 39, .06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 100%;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(calc(100vw - 36px), 1120px);
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    header {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand,
    nav,
    nav a,
    .actions,
    .actions a {
      display: inline-flex;
      align-items: center;
    }

    .brand {
      gap: 10px;
      font-weight: 900;
    }

    .mark {
      width: 32px;
      height: 32px;
      justify-content: center;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
    }

    nav,
    .actions {
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a,
    .actions a {
      min-height: 36px;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 850;
    }

    .primary {
      border-color: var(--ink) !important;
      background: var(--ink) !important;
      color: #fff;
    }

    .panel {
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .paper-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      overflow: hidden;
    }

    .paper-head > div {
      min-width: 0;
    }

    .label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 880px;
      margin: 0;
      font-size: clamp(32px, 5vw, 66px);
      line-height: .96;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .viewer {
      height: min(78vh, 920px);
      min-height: 620px;
      overflow: hidden;
      padding: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 760px) {
      .wrap {
        width: 100%;
        max-width: 100%;
        padding: 18px 18px 34px;
      }

      header,
      .paper-head {
        align-items: stretch;
        grid-template-columns: 1fr;
      }

      h1 {
        max-width: 100%;
        font-size: clamp(28px, 10vw, 34px);
        line-height: 1.05;
      }

      header {
        display: grid;
      }

      nav,
      .actions {
        justify-content: flex-start;
      }

      .viewer {
        height: 72vh;
        min-height: 460px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://aolabs.io/suite-header.css?v=20260516-suite-pane">
</head>
<body>
  <header class="suite-topbar" aria-label="relay paper navigation">
    <div class="suite-brand-cluster">
      <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
        <img src="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-pane" alt="">
      </a>
      <a class="suite-app-brand" href="/" aria-label="relay home">
        <img class="suite-app-mark" src="https://aolabs.io/icons/relay.svg?v=20260508-icon-pass2" alt="">
        <span class="suite-app-name">relay.aolabs.io</span>
      </a>
    </div>
  </header>

  <main class="wrap">

    <section class="panel paper-head" aria-label="Paper">
      <div>
        <p class="label">Paper</p>
        <h1>Proof-governed autonomy for live revenue experiments</h1>
        <p>Relay research record, compiled from the current manuscript source.</p>
      </div>
      <div class="actions">
        <a class="primary" href="/paper.pdf">Open PDF</a>
      </div>
    </section>

    <section class="panel viewer" aria-label="PDF preview">
      <iframe src="/paper.pdf#view=FitH" title="Relay paper PDF"></iframe>
    </section>
  </main>
</body>
</html>
