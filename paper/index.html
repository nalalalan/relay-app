<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paper | relay.aolabs.io</title>
  <meta name="description" content="Relay paper and source files.">
  <link rel="canonical" href="https://relay.aolabs.io/paper/">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="AO Labs">
  <meta property="og:title" content="Proof-governed autonomy for live revenue experiments">
  <meta property="og:description" content="Continuous research record for Relay.">
  <meta property="og:url" content="https://relay.aolabs.io/paper/">
  <link rel="icon" href="/favicon.svg?v=20260507-paper" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f3;
      --panel: #fff;
      --ink: #151515;
      --muted: #687067;
      --line: #dfe5dc;
      --shadow: 0 16px 42px rgba(17, 24, 39, .06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(calc(100vw - 36px), 1120px);
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    header {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand,
    nav,
    nav a,
    .actions,
    .actions a {
      display: inline-flex;
      align-items: center;
    }

    .brand {
      gap: 10px;
      font-weight: 900;
    }

    .mark {
      width: 32px;
      height: 32px;
      justify-content: center;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      font-weight: 950;
      display: inline-flex;
      align-items: center;
    }

    nav,
    .actions {
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a,
    .actions a {
      min-height: 36px;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 850;
    }

    .primary {
      border-color: var(--ink) !important;
      background: var(--ink) !important;
      color: #fff;
    }

    .panel {
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .paper-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
    }

    .label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 880px;
      margin: 0;
      font-size: clamp(32px, 5vw, 66px);
      line-height: .96;
      letter-spacing: 0;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    .viewer {
      height: min(78vh, 920px);
      min-height: 620px;
      overflow: hidden;
      padding: 0;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    @media (max-width: 760px) {
      header,
      .paper-head {
        align-items: stretch;
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

      nav,
      .actions {
        justify-content: flex-start;
      }

      .viewer {
        height: 72vh;
        min-height: 460px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <a class="brand" href="/">
        <span class="mark">AO</span>
        <span>Relay</span>
      </a>
      <nav aria-label="Paper navigation">
        <a href="/">Status</a>
        <a href="/paper.pdf">PDF</a>
        <a href="/paper/source.tex">Source</a>
        <a href="https://aolabs.io/">AO Labs</a>
      </nav>
    </header>

    <section class="panel paper-head" aria-label="Paper">
      <div>
        <p class="label">Paper</p>
        <h1>Proof-governed autonomy for live revenue experiments</h1>
        <p>Relay research record, compiled from the current manuscript source.</p>
      </div>
      <div class="actions">
        <a class="primary" href="/paper.pdf">Open PDF</a>
        <a href="/paper/source.tex">TeX source</a>
        <a href="/paper/references.bib">References</a>
      </div>
    </section>

    <section class="panel viewer" aria-label="PDF preview">
      <iframe src="/paper.pdf#view=FitH" title="Relay paper PDF"></iframe>
    </section>
  </main>
</body>
</html>
