<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relay | AO Labs</title>
  <meta name="description" content="Relay, an AO Labs project." />
  <link rel="canonical" href="https://relay.aolabs.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AO Labs" />
  <meta property="og:title" content="Relay | AO Labs" />
  <meta property="og:description" content="Relay, an AO Labs project." />
  <meta property="og:url" content="https://relay.aolabs.io/" />
  <meta property="og:image" content="https://relay.aolabs.io/og-image.png" />
  <meta property="og:image:secure_url" content="https://relay.aolabs.io/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Relay." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Relay | AO Labs" />
  <meta name="twitter:description" content="Relay, an AO Labs project." />
  <meta name="twitter:image" content="https://relay.aolabs.io/og-image.png" />
  <meta name="twitter:image:alt" content="Relay." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1eb;
      --paper: #fffdf9;
      --ink: #17130f;
      --muted: #746b61;
      --line: #ddd5ca;
      --accent: #8b5624;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      width: min(calc(100% - 32px), 1180px);
      min-height: 54px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .brand {
      color: var(--ink);
    }

    .topbar nav {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    main {
      width: min(calc(100% - 32px), 1180px);
      margin: 0 auto;
      padding: 58px 0 42px;
    }

    .head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding-bottom: 24px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(48px, 7vw, 92px);
      font-weight: 850;
      line-height: .9;
    }

    .sub {
      margin-top: 18px;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 620;
    }

    .actions,
    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button,
    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 14px;
      background: rgba(255, 253, 249, .54);
      color: var(--ink);
      font-size: 14px;
      font-weight: 780;
    }

    .button.primary {
      border-color: rgba(139, 86, 36, .42);
      color: #5d3516;
    }

    .button:hover,
    .button:focus-visible,
    .links a:hover,
    .links a:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .preview {
      overflow: hidden;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .preview img {
      aspect-ratio: 16 / 7.8;
      object-fit: cover;
      object-position: center top;
    }

    .links {
      justify-content: flex-start;
      padding-top: 14px;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 48px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 740px) {
      .topbar,
      main {
        width: min(calc(100% - 24px), 390px);
      }

      .topbar nav {
        gap: 12px;
      }

      main {
        padding-top: 36px;
      }

      .head {
        grid-template-columns: minmax(0, 1fr);
        align-items: start;
      }

      h1 {
        font-size: 54px;
      }

      .actions {
        justify-content: flex-start;
      }

      .preview img {
        aspect-ratio: 4 / 3.1;
      }
    }
  </style>
</head>
<body>
  <header class="topbar" aria-label="Relay navigation">
    <a class="brand" href="/">Relay</a>
    <nav>
      <a href="http://relaybrief.com/">Product</a>
      <a href="/manuscripts/relay-proof-governed-autonomy-for-live-revenue-experiments.pdf">Paper</a>
      <a href="https://aolabs.io/">AO Labs</a>
    </nav>
  </header>

  <main>
    <section class="head" aria-label="Relay">
      <div>
        <h1>Relay</h1>
        <p class="sub">Proof-governed autonomy.</p>
      </div>
      <div class="actions">
        <a class="button primary" href="/manuscripts/relay-proof-governed-autonomy-for-live-revenue-experiments.pdf">Paper</a>
        <a class="button" href="http://relaybrief.com/">Product</a>
      </div>
    </section>

    <a class="preview" href="http://relaybrief.com/" aria-label="Open Relay product page">
      <img src="/manuscripts/relay_nature_style/figures/relay-product-page-desktop.png" alt="Relay product page.">
    </a>

    <nav class="links" aria-label="Relay links">
      <a href="/manuscripts/relay-proof-governed-autonomy-for-live-revenue-experiments.pdf">Manuscript</a>
      <a href="/sample.pdf">Sample</a>
      <a href="http://relaybrief.com/">Live product</a>
    </nav>

    <footer>
      <span>Relay / AO Labs</span>
      <span>2026</span>
    </footer>
  </main>
</body>
</html>
